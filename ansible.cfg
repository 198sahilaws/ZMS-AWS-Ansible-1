[defaults]
inventory            = inventory/aws_ec2.yml
roles_path           = roles
collections_path     = collections
host_key_checking    = False          ; ephemeral cloud hosts churn keys
retry_files_enabled  = False
forks                = 20             ; ample for a few-dozen-host estate
interpreter_python   = auto_silent
stdout_callback      = yaml
callbacks_enabled    = profile_tasks
fact_caching         = jsonfile
fact_caching_connection = /var/tmp/ansible_facts
fact_caching_timeout = 3600
; Vault password is sourced from the secret store at run time. Provide the
; script/file out-of-band; kept out of Git (see .gitignore).
vault_password_file = .vault_pass

[inventory]
enable_plugins = aws_ec2             ; nothing else needed for AWS

[connection]
; NOTE: pipelining must live under [connection] (or [defaults]); ansible-core
; 2.16+ no longer reads it from [ssh_connection]. Biggest Linux push speedup;
; requires requiretty OFF in the managed hosts' sudoers (default on cloud images).
pipelining    = True

[ssh_connection]
ssh_args      = -o ControlMaster=auto -o ControlPersist=60s
control_path  = /tmp/ansible-%%r@%%h:%%p

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
